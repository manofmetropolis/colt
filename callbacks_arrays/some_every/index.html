<body>
    <h1>Some and Every</h1>
    <p>Both functions return a boolean: <code>true</code> or <code>false</code>.</p>
    <h2>Some</h2>
    <p>Returns <code>true</code> if any element in an array passes the test function.</p>
    <h2>Every</h2>
    <p>Returns <code>true</code> if ALL elements in an array passes the test function.</p>
